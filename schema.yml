components:
  schemas:
    AdminAccessCodeDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          maxLength: 100
        duration_months:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        is_active:
          type: boolean
        is_consumed:
          type: boolean
        consumed_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        user:
          type: string
          format: uuid
          nullable: true
        user_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - user_name
    AdminAnalyticsStats:
      type: object
      properties:
        daily_active_users:
          type: integer
        training_sessions:
          type: integer
        video_uploads:
          type: integer
        tournament_participation:
          type: integer
        new_users_today:
          type: integer
      required:
      - daily_active_users
      - new_users_today
      - tournament_participation
      - training_sessions
      - video_uploads
    AdminLeaderboard:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_name:
          type: string
          readOnly: true
        total_kicks:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        rank:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        points:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        country:
          type: string
          nullable: true
          maxLength: 100
      required:
      - id
      - user_name
    AdminLogin:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    AdminLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    AdminOverview:
      type: object
      properties:
        total_users:
          type: integer
        total_tournaments:
          type: integer
        total_sessions:
          type: integer
        total_videos:
          type: integer
        analytics:
          $ref: '#/components/schemas/AdminAnalyticsStats'
        recent_activity:
          type: array
          items:
            $ref: '#/components/schemas/CombinedActivity'
        registration_trend:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - analytics
      - recent_activity
      - registration_trend
      - total_sessions
      - total_tournaments
      - total_users
      - total_videos
    AdminPasswordResetRequest:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - new_password
      - old_password
    AdminTournament:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        product_purchase_link:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        prize_money:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_free:
          type: boolean
        is_active:
          type: boolean
        participant_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - participant_count
      - title
    AdminTournamentRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
